<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Joveo · Supply Gap Agent</title>
    <style>
        :root { --bg: #04070f; --surface: #080d1a; --accent: #2563eb; --text: #e8edf5; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 2rem; }
        .card { background: var(--surface); border: 1px solid #131f38; padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .priority-HIGH { border-left: 5px solid var(--red); }
        .contact-info { font-size: 0.9rem; color: #8892a4; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Supply Gap Intelligence</h1>
    <p>Logged in as: <strong>Isha Singh (ishaa@joveo.com)</strong></p>
    
    <div style="margin-bottom: 2rem;">
        <input id="query" type="text" placeholder="Region + Vertical (e.g. Germany Healthcare)" style="padding: 10px; width: 300px;">
        <button class="btn" onclick="runScan()">Find Gap Publishers</button>
    </div>

    <div id="results"></div>

    <script>
        let foundGaps = [];

        async function runScan() {
            const q = document.getElementById('query').value;
            const res = await fetch('/api/chat', {
                method: 'POST',
                body: JSON.stringify({
                    messages: [{ role: 'user', content: `Find 5 publisher gaps in ${q}` }],
                    model: 'claude-3-haiku-20240307',
                    max_tokens: 1000
                })
            });
            const data = await res.json();

if (!data.content) {
    alert("API Error: " + JSON.stringify(data));
    return;
}

try {
    foundGaps = JSON.parse(data.content[0].text);
} catch (e) {
    console.error(data);
    alert("Parsing failed. Check console.");
}
            render();
        }

        function render() {
            const container = document.getElementById('results');
            container.innerHTML = foundGaps.map((g, i) => `
                <div class="card priority-${g.priority}">
                    <h3>${g.name}</h3>
                    <div class="contact-info">
                        👤 ${g.contact_person} | 📧 ${g.contact_email}
                    </div>
                    <p>${g.why}</p>
                    <button class="btn" onclick="sendOutreach(${i})">🚀 Send Outreach from Isha</button>
                </div>
            `).join('');
        }

        function sendOutreach(i) {
            const g = foundGaps[i];
            const subject = `Partnership Inquiry: Joveo x ${g.name}`;
            const body = `Hi ${g.contact_person.split(' ')[0]},\n\nI’m Isha from the Global Partnerships team at Joveo. We are looking to expand our programmatic demand in ${g.name}...\n\nBest, Isha Singh\nishaa@joveo.com`;
            window.open(`mailto:${g.contact_email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
        }
    </script>
</body>
</html>
